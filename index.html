<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeroporto Inteligente - Sistema de Voo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Aeroporto Inteligente</h1>
        
        <div id="painel-voo" class="painel">
            <div class="aviao-container">
                <img id="aviao-img" src="https://cdn-icons-png.flaticon.com/512/619/619043.png" alt="Avião">
            </div>
            
            <div class="info-voo">
                <p><strong>Código:</strong> <span id="display-codigo">-</span></p>
                <p><strong>Origem:</strong> <span id="display-origem">-</span></p>
                <p><strong>Destino:</strong> <span id="display-destino">-</span></p>
                <p><strong>Horário:</strong> <span id="display-horario">-</span></p>
                <p><strong>Status:</strong> <span id="display-status" class="status-badge">-</span></p>
            </div>
        </div>

        <div class="controles">
            <button id="btn-decolar" class="btn">Decolar</button>
            <button id="btn-pousar" class="btn">Pousar</button>
            <button id="btn-atrasar" class="btn btn-secundario">Atrasar Voo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
